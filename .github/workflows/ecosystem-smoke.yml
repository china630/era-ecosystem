name: Ecosystem smoke

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            packages/era-contracts/package-lock.json
            packages/satellite-kit/package-lock.json
      - name: Build era-contracts
        working-directory: packages/era-contracts
        run: |
          npm ci
          npm run build
      - name: Build satellite-kit
        working-directory: packages/satellite-kit
        run: |
          npm ci
          npm run build

  build-orchestrator-web:
    runs-on: ubuntu-latest
    needs: build-packages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build orchestrator web
        working-directory: era-365-orchestrator/apps/web
        run: |
          npm install
          npm run build

  build-orchestrator-api:
    runs-on: ubuntu-latest
    needs: build-packages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install orchestrator API
        working-directory: era-365-orchestrator
        run: npm ci
      - name: Generate Prisma client
        working-directory: era-365-orchestrator/packages/database
        run: npx prisma generate
      - name: Build orchestrator API
        working-directory: era-365-orchestrator/apps/api
        run: npm run build

  build-finance-api:
    runs-on: ubuntu-latest
    needs: build-packages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install finance-core API
        working-directory: era-finance-core
        run: npm ci
      - name: Generate Prisma client
        working-directory: era-finance-core/packages/database
        run: npx prisma generate
      - name: Build finance API
        working-directory: era-finance-core/apps/api
        run: npm run build

  build-quartet-satellites:
    runs-on: ubuntu-latest
    needs: build-packages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build hotel-pms
        working-directory: era-hotel-pms
        run: |
          npm ci
          npx prisma generate
          npm run build
      - name: Build fb-pos
        working-directory: era-fb-pos
        run: |
          npm ci
          npx prisma generate
          npm run build

  quartet-smoke:
    runs-on: ubuntu-latest
    needs: [build-orchestrator-api, build-finance-api, build-quartet-satellites]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Quartet health script (services optional in CI)
        run: node scripts/quartet-smoke.mjs
      - name: POS bridge script (compile check)
        working-directory: era-hotel-pms
        run: node --check scripts/test-pos-bridge.mjs
      - name: SSO launch smoke script (compile check)
        run: node --check scripts/sso-launch-smoke.mjs

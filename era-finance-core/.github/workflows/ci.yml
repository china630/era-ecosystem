name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: postgresql://erafinance:erafinance@127.0.0.1:5432/erafinance?schema=public
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: ci-jwt-secret
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret
      NODE_ENV: test
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: erafinance
          POSTGRES_PASSWORD: erafinance
          POSTGRES_DB: erafinance
        options: >-
          --health-cmd "pg_isready -U erafinance -d erafinance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        run: npm ci
      - name: Prisma migrate (deploy)
        run: npm run db:migrate:deploy
      - name: ESLint API
        run: npm run lint -w @erafinance/api
      - name: Unit tests (API src only)
        run: npm run test -w @erafinance/api -- --testPathPattern=src/
      - name: Integration tests (API test/, exclude e2e)
        run: npm run test:integration -w @erafinance/api
      - name: Monorepo build
        run: npm run build

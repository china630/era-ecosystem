# Production stack: Postgres, Redis, Nest API, Next.js.
# Build context: repository root. Скопируйте env: `cp env.production.example .env` и заполните секреты.
#
# ВАЖНО (Prisma): не монтируем `prisma/migrations` в `docker-entrypoint-initdb.d`.
# Иначе SQL применяется в обход `prisma migrate deploy`, и Prisma получает "непустую БД без baseline" (P3005).
# Миграции/сидинг/i18n — через контейнер `api` (см. `docs/deploy/deploy.ru.md`: `db:migrate:deploy`, `db:sync-i18n:prune` / `db:deploy`, `db:prod-init`).
#
# Логи: json-file с ротацией (см. x-logging). BullMQ: при необходимости отдельный Redis DB — `REDIS_URL=redis://redis:6379/2`.
# Опциональный мониторинг: `docs/deploy/monitoring/docker-compose.monitoring.yml`.

x-logging: &json-file-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  db:
    image: postgres:16-alpine
    restart: always
    logging: *json-file-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erafinance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-erafinance}
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erafinance} -d ${POSTGRES_DB:-erafinance}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: always
    logging: *json-file-logging
    command: >
      redis-server
      --appendonly yes
      --save 60 1000
      --maxmemory 512mb
      --maxmemory-policy noeviction
    volumes:
      - ./redis-data:/data
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # REDIS_URL берётся только из .env (единый источник). Для стека ниже: redis://redis:6379
  # (хост `redis` — имя сервиса в этой сети Compose).
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    logging: *json-file-logging
    env_file:
      - path: .env
        required: false
      - path: docker/stack.local.env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-erafinance}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-erafinance}
      API_PORT: ${API_PORT:-4000}
      SENTRY_DSN_API: ${SENTRY_DSN_API:-}
    # Локальное хранилище: на хосте см. ERAFINANCE_STORAGE_HOST_PATH; в контейнере путь = STORAGE_LOCAL_ROOT из .env (по умолчанию /var/lib/erafinance/storage).
    volumes:
      - ${ERAFINANCE_STORAGE_HOST_PATH:-/var/lib/erafinance/storage}:/var/lib/erafinance/storage
    ports:
      - "${API_PUBLISH_PORT:-4000}:${API_PORT:-4000}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:'+(process.env.API_PORT||4000)+'/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      # Все значения подставляются из .env в каталоге compose (или export в shell).
      # NEXT_PUBLIC_* обязаны попасть в ENV до `next build`, иначе DSN не вшивается в клиентский бандл.
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:4000}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT_WEB: ${SENTRY_PROJECT_WEB:-}
        SENTRY_TUNNEL_PATH: ${SENTRY_TUNNEL_PATH:-}
    restart: always
    logging: *json-file-logging
    env_file:
      - path: .env
        required: false
      - path: docker/stack.local.env
        required: false
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:4000}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      # 1/true/on — отдаёт 503 из Next (см. MAINTENANCE_MODE в env.production.example). Нужен перезапуск web.
      MAINTENANCE_MODE: ${MAINTENANCE_MODE:-}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode&&r.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 25s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  pgdata:

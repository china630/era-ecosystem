global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Extend with node_exporter, cadvisor, or blackbox exporter targets on your VPC.
  # Example (uncomment after deploying exporters on known hosts):
  # - job_name: node
  #   static_configs:
  #     - targets: ["node_exporter:9100"]

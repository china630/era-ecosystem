# Nginx maintenance mode snippet (ERA Finance)
#
# Альтернатива: в `.env` задать MAINTENANCE_MODE=1 и перезапустить сервис `web` в Compose
# (см. env.production.example и §7.0 в docs/deploy.ru.md) — тогда 503 отдаёт сам Next.
#
# Behavior:
# - If /var/www/html/maintenance.enable exists:
#   - return 503 for all requests
#   - serve /var/www/html/maintenance.html as the 503 page
#
# Prerequisites on server:
#   - Put maintenance.html into /var/www/html/maintenance.html
#   - Toggle file: /var/www/html/maintenance.enable
#
# Usage:
# - Include this inside your server { } block.

# Toggle by file presence
if (-f /var/www/html/maintenance.enable) {
  return 503;
}

error_page 503 @erafinance_maintenance;

location @erafinance_maintenance {
  root /var/www/html;
  add_header Cache-Control "no-store" always;
  add_header Retry-After "120" always;
  try_files /maintenance.html =503;
}


# Example reverse proxy for ERA Finance (Nginx) — gzip, upstreams, TLS stubs.
# Merge with your real server_name, ACME paths, and security headers policy.
# Maintenance toggle: see docs/nginx-maintenance.conf
#
# TLS: use Let's Encrypt (certbot) or Caddy automatic HTTPS (see docs/deploy/deploy.md § reverse proxy).

upstream erafinance_api {
    zone erafinance_api 64k;
    server 127.0.0.1:4000;
    keepalive 32;
}

upstream erafinance_web {
    zone erafinance_web 64k;
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name erp.example.com;

    # ssl_certificate     /etc/letsencrypt/live/erp.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/erp.example.com/privkey.pem;

    # gzip (brotli needs ngx_brotli module — omit if unavailable)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://erafinance_api;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://erafinance_web;
    }
}

server {
    listen 80;
    server_name erp.example.com;
    return 301 https://$host$request_uri;
}
